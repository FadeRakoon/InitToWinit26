<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Map Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- MapLibre GL JS CSS -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="topbar">
        <div class="topbar-logo">
            <i class="fa-solid fa-cloud-bolt"></i>
            <span>Weather Guardians</span>
        </div>
        <div class="topbar-links">
            <a href="landing.html">Home</a>
            <a href="#">About</a>
            <a href="#">Technology</a>
            <a href="index.html" class="nav-btn active">Grid Map</a>
        </div>
    </nav>

    <div id="app">
        <!-- Map Container -->
        <div id="map-container">
            <div id="map-background"></div>
        </div>

        <!-- Floating Search Bar -->
        <div id="search-container">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Search coordinates, regions, or landmarks..." id="search-input">
                <button class="ai-btn"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
            </div>
        </div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-hidden">
            <div class="sidebar-header">
                <h2>Region Analysis</h2>
                <button id="close-sidebar"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="sidebar-content">
                <div id="empty-state" class="state-view active">
                    <div class="empty-icon"><i class="fa-solid fa-map-location-dot"></i></div>
                    <p>Select a region on the map to generate AI insights.</p>
                </div>
                
                <div id="loading-state" class="state-view">
                    <div class="loader"></div>
                    <p>AI is analyzing region data...</p>
                </div>

                <div id="data-state" class="state-view">
                    <div class="region-badge" id="region-id">Sector 7G</div>
                    <div class="ai-generated-text" id="ai-content">
                        <!-- Content injected via JS -->
                    </div>
                    
                    <div class="data-cards">
                        <div class="card">
                            <span class="card-label">Activity Level</span>
                            <div class="card-value" id="val-activity">High</div>
                        </div>
                        <div class="card">
                            <span class="card-label">Anomalies</span>
                            <div class="card-value" id="val-anomalies">0 Detected</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="script.js"></script>
</body>
</html>
